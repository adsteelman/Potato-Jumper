openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: leaderboard
    description: Leaderboard operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /leaderboard:
    get:
      operationId: getLeaderboard
      tags: [leaderboard]
      summary: Get top 10 leaderboard entries
      responses:
        "200":
          description: Top 10 scores
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaderboardEntry"
    post:
      operationId: submitScore
      tags: [leaderboard]
      summary: Submit a score to the leaderboard
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScoreInput"
      responses:
        "201":
          description: Score submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaderboardEntry"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    LeaderboardEntry:
      type: object
      required: [id, playerName, score, stageReached, createdAt]
      properties:
        id:
          type: integer
        playerName:
          type: string
        score:
          type: integer
        stageReached:
          type: integer
        createdAt:
          type: string
    ScoreInput:
      type: object
      required: [playerName, score, stageReached]
      properties:
        playerName:
          type: string
          minLength: 1
          maxLength: 12
        score:
          type: integer
          minimum: 0
        stageReached:
          type: integer
          minimum: 0
          maximum: 4
    ApiError:
      type: object
      required: [error]
      properties:
        error:
          type: string
