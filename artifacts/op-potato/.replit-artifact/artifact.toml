kind = "web"
previewPath = "/"
title = "Op Potato"
version = "1.0.0"
id = "artifacts/op-potato"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24899

[services.development]
run = "pnpm --filter @workspace/op-potato run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/op-potato", "run", "build" ]
publicDir = "artifacts/op-potato/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24899"
BASE_PATH = "/"
